<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legacy Home Team — KPI Dashboard</title>
<style>
:root {
  --bg: #05070e;
  --surface: #111827;
  --surface2: #1e2536;
  --surface3: #2a3349;
  --border: #2e3a52;
  --text: #edf0f7;
  --text-muted: #7e89a3;
  --brand: #3B8AFF;
  --brand-dim: rgba(59,138,255,0.12);
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.1);
  --blue: #60a5fa;
  --purple: #a78bfa;
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.1);
  --rose: #fb7185;
  --rose-dim: rgba(251,113,133,0.1);
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(59,138,255,0.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(96,165,250,0.04) 0%,transparent 50%);min-height:100vh}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 36px;background:rgba(17,24,39,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;height:60px}
.topbar h1{font-size:18px;font-weight:800}
.topbar h1 span{color:var(--brand)}
.topbar h1 .gray{color:var(--text-muted);font-weight:400}
.logo-icon{width:28px;height:28px;vertical-align:middle;margin-right:8px}

.tabs{display:flex;gap:0;height:100%}
.tab{padding:0 24px;height:100%;display:flex;align-items:center;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s}
.tab:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}

.container{max-width:1320px;margin:0 auto;padding:24px 36px 80px}

/* Controls */
.controls{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:24px;padding:18px 22px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.control-field label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;display:block;margin-bottom:4px}
.control-field input{width:72px;padding:8px 12px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:14px;font-weight:600;text-align:center}
.control-field input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-dim)}
.btn{padding:9px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:12px;font-weight:700;transition:all 0.2s;letter-spacing:0.3px}
.btn-primary{background:linear-gradient(135deg,#3B8AFF,#2563eb);color:#fff;box-shadow:0 2px 12px rgba(59,138,255,0.3)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-info{background:linear-gradient(135deg,#60a5fa,#818cf8);color:#fff}
.btn-warn{background:linear-gradient(135deg,var(--amber),#f59e0b);color:#05070e}
.btn-rose{background:linear-gradient(135deg,var(--rose),#e11d48);color:#fff}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
.btn-sm{padding:6px 14px;font-size:11px}

/* Stat Cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.stat-card .icon{font-size:22px;margin-bottom:8px}
.stat-card .label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:4px}
.stat-card .value{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat-card .sub{font-size:11px;color:var(--text-muted);margin-top:4px}
.stat-card .trend{font-size:12px;font-weight:700;margin-top:4px}
.trend-up{color:var(--green)}
.trend-down{color:var(--rose)}
.trend-flat{color:var(--text-muted)}

/* Section Headers */
.section-header{display:flex;align-items:center;gap:8px;margin:28px 0 12px;font-size:15px;font-weight:700}
.section-header .icon{font-size:18px}

/* Tables */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:12px 14px;text-align:left;font-weight:700;color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--border);background:var(--surface2)}
tbody td{padding:11px 14px;border-bottom:1px solid rgba(46,58,82,0.5)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,0.03)}
.agent-name{font-weight:600;white-space:nowrap}

/* Tags */
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.3px}
.tag-pass{background:var(--green-dim);color:var(--green)}
.tag-fail{background:var(--rose-dim);color:var(--rose)}
.tag-warn{background:var(--amber-dim);color:var(--amber)}
.tag-brand{background:var(--brand-dim);color:var(--brand)}

.val-pass{color:var(--green)}
.val-fail{color:var(--rose);font-weight:700}
.val-warn{color:var(--amber)}
.val-muted{color:var(--text-muted)}

/* Bars */
.bar-track{height:8px;border-radius:4px;background:var(--surface2);overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.8s ease;min-width:2px}
.fill-brand{background:linear-gradient(90deg,#3B8AFF,#2563eb)}
.fill-green{background:linear-gradient(90deg,var(--green),#22c55e)}
.fill-blue{background:linear-gradient(90deg,var(--blue),var(--purple))}
.fill-amber{background:linear-gradient(90deg,var(--amber),#f59e0b)}
.fill-rose{background:linear-gradient(90deg,var(--rose),#e11d48)}

/* Action Boxes */
.action-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:14px;box-shadow:var(--shadow);border-left:4px solid var(--amber)}
.action-box.green{border-left-color:var(--green)}
.action-box.red{border-left-color:var(--rose)}
.action-box.brand{border-left-color:var(--brand)}
.action-box .title{font-weight:700;font-size:14px;margin-bottom:8px}
.action-box ul{list-style:none;padding:0}
.action-box li{padding:4px 0;font-size:13px;font-weight:500}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:768px){.two-col{grid-template-columns:1fr}}

/* Trend cards (Manager tab) */
.trend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:20px}
.trend-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);transition:border-color 0.3s}
.trend-card.improving{border-left:4px solid var(--green)}
.trend-card.stable{border-left:4px solid var(--text-muted)}
.trend-card.declining{border-left:4px solid var(--rose)}
.trend-card .name{font-weight:700;font-size:14px;margin-bottom:10px}
.trend-card .stats{display:flex;gap:16px;margin-bottom:10px}
.trend-card .stat-mini{text-align:center}
.trend-card .stat-mini .num{font-size:20px;font-weight:800}
.trend-card .stat-mini .lbl{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}
.mini-bars{display:flex;gap:3px;align-items:flex-end;height:32px;margin-top:8px}
.mini-bar{flex:1;border-radius:3px 3px 0 0;background:var(--surface3);transition:height 0.5s}

/* Funnel (ISA tab) */
.funnel{margin:16px 0 24px}
.funnel-step{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.funnel-label{width:100px;font-size:12px;font-weight:600;text-align:right}
.funnel-bar-wrap{flex:1;height:28px;background:var(--surface2);border-radius:6px;overflow:hidden;position:relative}
.funnel-bar{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:700;color:#fff;transition:width 0.8s}
.funnel-pct{width:50px;font-size:11px;color:var(--text-muted);font-weight:600}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--text-muted);font-size:13px}

.page{display:none}
.page.active{display:block}
.medal{font-size:18px}
.footer-note{text-align:center;color:var(--text-muted);font-size:11px;margin-top:40px;padding:20px;border-top:1px solid var(--border)}

/* Insight callout */
.insight{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:8px;font-size:13px;border-left:3px solid var(--rose)}
.insight.warn{border-left-color:var(--amber)}
.insight strong{color:var(--text)}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="topbar">
  <h1>
    <svg class="logo-icon" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="#3B8AFF" stroke-width="6"/><path d="M50 20 L25 45 L30 45 L30 70 L45 70 L45 55 L55 55 L55 70 L70 70 L70 45 L75 45 Z" fill="#3B8AFF"/><rect x="45" y="58" width="10" height="12" rx="2" fill="#05070e"/></svg>
    <span>LEGACY</span> <span class="gray">HOME TEAM</span>
  </h1>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('agents')">Agent KPIs</div>
    <div class="tab" onclick="switchTab('manager')">Sales Manager</div>
    <div class="tab" onclick="switchTab('isa')">ISA Performance</div>
  </div>
</div>

<div class="container">
  <!-- Tab: Agent KPIs -->
  <div class="page active" id="page-agents">
    <div class="controls" id="controls" style="display:none;">
      <div class="control-field"><label>Min Calls</label><input type="number" id="minCalls" value="30"></div>
      <div class="control-field"><label>Min Convos</label><input type="number" id="minConvos" value="5"></div>
      <div class="control-field"><label>Max OOC</label><input type="number" id="maxOoc" value="100"></div>
      <div class="btn-group">
        <button class="btn" style="background:var(--surface3);color:var(--text)" onclick="saveSettings()">Save</button>
        <button class="btn btn-primary" onclick="loadAgents()">Run Audit</button>
        <button class="btn btn-info" id="btnUpdateGroup" style="display:none" onclick="updateGroup()">Update Group</button>
        <button class="btn btn-warn" id="btnSendEmail" style="display:none" onclick="sendEmail()">Email Report</button>
      </div>
    </div>
    <div class="loading" id="loading-agents"><div class="spinner"></div><p>Loading agent data...</p></div>
    <div id="dashboard-agents"></div>
  </div>

  <!-- Tab: Sales Manager -->
  <div class="page" id="page-manager">
    <div style="display:flex;justify-content:flex-end;margin-bottom:8px;gap:8px" id="manager-actions" style="display:none">
      <button class="btn btn-warn btn-sm" onclick="sendManagerEmail()" id="btnManagerEmail">📧 Email Joe's Game Plan</button>
    </div>
    <div class="loading" id="loading-manager" style="display:none"><div class="spinner"></div><p>Analyzing 4 weeks of agent performance, texts, and coaching intelligence...</p></div>
    <div id="dashboard-manager"></div>
  </div>

  <!-- Tab: ISA Performance -->
  <div class="page" id="page-isa">
    <div class="loading" id="loading-isa" style="display:none"><div class="spinner"></div><p>Loading ISA performance data...</p></div>
    <div id="dashboard-isa"></div>
  </div>
</div>

<script>
const MEDALS = ['&#129351;','&#129352;','&#129353;'];
let agentData=null, managerData=null, isaData=null;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='manager' && !managerData) loadManager();
  if(tab==='isa' && !isaData) loadIsa();
}

function trendArrow(dir,pct) {
  if(dir==='up') return `<span class="trend-up">&#9650; ${Math.abs(pct)}%</span>`;
  if(dir==='down') return `<span class="trend-down">&#9660; ${Math.abs(pct)}%</span>`;
  return `<span class="trend-flat">&#9654; flat</span>`;
}
function fmtPct(n){return n>0?n+'%':'—'}
function maxOf(arr,key){return Math.max(...arr.map(a=>a[key]||a.metrics?.[key]||0),1)}

// ======== TAB 1: AGENTS ========
function buildAgents(d) {
  const t=d.totals, agents=d.agents;
  const passed=agents.filter(a=>a.evaluation.overall_pass);
  const failed=agents.filter(a=>!a.evaluation.overall_pass);
  let h='';
  h+=`<div class="stat-grid">
    <div class="stat-card"><div class="icon">&#128222;</div><div class="label">Calls</div><div class="value" style="color:var(--brand)">${t.calls}</div><div class="sub">${agents.length} agents</div></div>
    <div class="stat-card"><div class="icon">&#128172;</div><div class="label">Conversations</div><div class="value" style="color:var(--blue)">${t.convos}</div><div class="sub">&ge;2 min</div></div>
    <div class="stat-card"><div class="icon">&#9201;</div><div class="label">Talk Time</div><div class="value" style="color:var(--purple)">${t.talk_fmt}</div></div>
    <div class="stat-card"><div class="icon">&#128197;</div><div class="label">Appts Set</div><div class="value" style="color:var(--green)">${t.appts_set}</div><div class="sub">${t.appts_met} met</div></div>
    <div class="stat-card"><div class="icon">&#127942;</div><div class="label">KPI Pass</div><div class="value" style="color:${t.passed>0?'var(--green)':'var(--amber)'}">${t.passed}/${t.total}</div></div>
    <div class="stat-card"><div class="icon">&#9888;&#65039;</div><div class="label">OOC</div><div class="value" style="color:${t.ooc>0?'var(--rose)':'var(--green)'}">${t.ooc}</div></div>
  </div>`;

  // Action items
  h+=`<div class="section-header"><span class="icon">&#9889;</span> Action Items</div>`;
  h+=`<div class="action-box"><div class="title">@${d.live_calls_admin} — Update Live Calls Inbox</div>`;
  if(passed.length>0){h+='<div style="margin-bottom:6px;font-weight:600;color:var(--green)">ADD:</div><ul>';passed.forEach(a=>h+=`<li class="val-pass">&#9989; ${a.name}</li>`);h+='</ul>';}
  if(failed.length>0){if(passed.length>0)h+='<br>';h+='<div style="margin-bottom:6px;font-weight:600;color:var(--rose)">REMOVE:</div><ul>';
    failed.forEach(a=>{const r=(a.failures||[]).map(f=>`<span class="tag tag-fail" style="margin-left:6px">${f}</span>`).join('');h+=`<li class="val-fail" style="display:flex;align-items:center;flex-wrap:wrap">&#10060; ${a.name} ${r}</li>`;});h+='</ul>';}
  h+='</div>';

  h+='<div class="two-col">';
  h+=`<div class="action-box ${passed.length?'green':'red'}"><div class="title">&#127775; Priority Group</div>`;
  if(passed.length){h+='<ul>';passed.forEach(a=>h+=`<li class="val-pass">&#9989; ${a.name}</li>`);h+='</ul>';}else h+='<p class="val-muted">No agents qualified.</p>';
  h+='</div>';
  if(t.ooc>0){const w=agents.reduce((a,b)=>a.metrics.compliance_violations>b.metrics.compliance_violations?a:b);h+=`<div class="action-box red"><div class="title">&#128680; Compliance</div><p style="font-size:13px">${t.ooc} leads OOC. <strong>${w.name}</strong> has ${w.metrics.compliance_violations}.</p></div>`;}
  else h+='<div class="action-box green"><div class="title">&#9989; Compliance</div><p class="val-pass">All clear!</p></div>';
  h+='</div>';

  // Leaderboard
  const mxC=maxOf(agents,'outbound_calls'),mxV=maxOf(agents,'conversations');
  h+=`<div class="section-header"><span class="icon">&#127942;</span> Leaderboard</div>`;
  h+='<div class="table-wrap"><table><thead><tr><th>#</th><th>Agent</th><th>Calls</th><th style="width:100px"></th><th>Convos</th><th style="width:100px"></th><th>Appt</th><th>Met</th><th>Talk</th><th>OOC</th><th>KPI</th></tr></thead><tbody>';
  agents.forEach((a,i)=>{const m=a.metrics,e=a.evaluation,rk=i<3?`<span class="medal">${MEDALS[i]}</span>`:(i+1),tg=e.overall_pass?'<span class="tag tag-pass">PASS</span>':'<span class="tag tag-fail">FAIL</span>';
    h+=`<tr><td style="text-align:center">${rk}</td><td class="agent-name">${a.name}</td><td class="${e.calls_pass?'':'val-fail'}">${m.outbound_calls}</td><td><div class="bar-track"><div class="bar-fill fill-brand" style="width:${Math.round(m.outbound_calls/mxC*100)}%"></div></div></td><td class="${e.convos_pass?'':'val-fail'}">${m.conversations}</td><td><div class="bar-track"><div class="bar-fill fill-blue" style="width:${Math.round(m.conversations/mxV*100)}%"></div></div></td><td>${m.appts_set}</td><td>${m.appts_met}</td><td class="val-muted">${a.talk_time_fmt}</td><td class="${e.compliance_pass?'':'val-fail'}">${m.compliance_violations}</td><td>${tg}</td></tr>`;});
  h+='</tbody></table></div>';

  // Funnel
  h+=`<div class="section-header"><span class="icon">&#128200;</span> Conversion Funnel</div>`;
  h+='<div class="table-wrap"><table><thead><tr><th>Agent</th><th>Calls</th><th>&rarr;Convos</th><th>&rarr;Appt Set</th><th>&rarr;Appt Met</th><th>Call&rarr;Convo</th><th>Convo&rarr;Appt</th><th>Set&rarr;Met</th></tr></thead><tbody>';
  agents.forEach(a=>{const m=a.metrics;h+=`<tr><td class="agent-name">${a.name}</td><td>${m.outbound_calls}</td><td>${m.conversations}</td><td>${m.appts_set}</td><td>${m.appts_met}</td><td><span class="tag tag-brand">${fmtPct(a.call_to_convo)}</span></td><td><span class="tag tag-brand">${fmtPct(a.convo_to_appt)}</span></td><td><span class="tag tag-brand">${fmtPct(a.set_to_met)}</span></td></tr>`;});
  h+='</tbody></table></div>';

  // OOC
  const ooc=agents.filter(a=>a.metrics.compliance_violations>0).sort((a,b)=>b.metrics.compliance_violations-a.metrics.compliance_violations);
  if(ooc.length){const mxO=ooc[0].metrics.compliance_violations;h+=`<div class="section-header"><span class="icon">&#128680;</span> Compliance Breakdown</div><div class="table-wrap"><table><thead><tr><th>Agent</th><th>Total</th><th>Leads</th><th>Sphere</th><th style="width:180px"></th></tr></thead><tbody>`;
    ooc.forEach(a=>{const m=a.metrics,p=m.compliance_violations>0?Math.round(m.ooc_leads/m.compliance_violations*100):0;h+=`<tr><td class="agent-name">${a.name}</td><td class="val-fail">${m.compliance_violations}</td><td>${m.ooc_leads}</td><td>${m.ooc_sphere}</td><td><div class="bar-track" style="height:10px"><div class="bar-fill fill-rose" style="width:${Math.round(m.compliance_violations/mxO*100)}%"></div></div></td></tr>`;});
    h+='</tbody></table></div>';}
  return h;
}

async function loadAgents() {
  const ld=document.getElementById('loading-agents'),db=document.getElementById('dashboard-agents'),ct=document.getElementById('controls');
  ld.style.display='flex';db.style.display='none';
  try{
    const r=await fetch(`/api/audit?min_calls=${document.getElementById('minCalls').value}&min_convos=${document.getElementById('minConvos').value}&max_ooc=${document.getElementById('maxOoc').value}`);
    const d=await r.json();
    if(d.error){db.innerHTML=`<div class="action-box red"><div class="title">Error</div><p>${d.error}</p></div>`;}
    else{agentData=d;document.getElementById('minCalls').value=d.thresholds.min_calls;document.getElementById('minConvos').value=d.thresholds.min_convos;document.getElementById('maxOoc').value=d.thresholds.max_ooc;db.innerHTML=buildAgents(d);document.getElementById('btnUpdateGroup').style.display='';document.getElementById('btnSendEmail').style.display='';}
  }catch(e){db.innerHTML=`<div class="action-box red"><div class="title">Error</div><p>${e.message}</p></div>`;}
  ld.style.display='none';db.style.display='block';ct.style.display='flex';
}

// ======== TAB 2: SALES MANAGER ========
function gradeColor(g){return{A:'var(--green)',B:'var(--blue)',C:'var(--amber)',D:'var(--rose)',F:'var(--rose)'}[g]||'var(--text-muted)'}
function gradeEmoji(g){return{A:'🟢',B:'🔵',C:'🟡',D:'🟠',F:'🔴'}[g]||'⚪'}

function buildManager(d) {
  const tw=d.team_weeks, at=d.agent_trends, cs=d.coaching_summary, kpi=d.kpi;
  const currT=tw[0]?.totals||{}, prevT=tw[1]?.totals||{};
  let h='';

  // ---- Header with date range and KPI reference ----
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
    <div><span style="font-size:11px;color:var(--text-muted)">REPORTING PERIOD</span><br>
    <span style="font-size:15px;font-weight:700">${tw[0]?.label||''}</span></div>
    <div style="display:flex;gap:16px;background:var(--surface);padding:10px 18px;border-radius:var(--radius-sm);border:1px solid var(--border)">
      <div style="text-align:center"><span style="font-size:10px;color:var(--text-muted)">MIN CALLS</span><br><span style="font-weight:800;color:var(--brand)">${kpi.min_calls}</span></div>
      <div style="text-align:center"><span style="font-size:10px;color:var(--text-muted)">MIN CONVOS</span><br><span style="font-weight:800;color:var(--brand)">${kpi.min_convos}</span></div>
      <div style="text-align:center"><span style="font-size:10px;color:var(--text-muted)">MAX OOC</span><br><span style="font-weight:800;color:var(--brand)">${kpi.max_ooc}</span></div>
    </div></div>`;

  // ---- Team Pulse (top stat cards) ----
  function pulse(icon,label,curr,prev,extra){
    const pct=prev>0?Math.round((curr-prev)/prev*100):(curr>0?100:0);
    const dir=pct>10?'up':pct<-10?'down':'flat';
    return `<div class="stat-card"><div class="icon">${icon}</div><div class="label">${label}</div><div class="value" style="color:var(--brand)">${curr}</div><div class="trend">${trendArrow(dir,pct)}</div>${extra?'<div class="sub">'+extra+'</div>':''}</div>`;
  }
  h+='<div class="stat-grid" style="grid-template-columns:repeat(5,1fr)">';
  h+=pulse('📞','Team Calls',currT.calls||0,prevT.calls||0,'');
  h+=pulse('💬','Conversations',currT.convos||0,prevT.convos||0,`${cs.team_call_to_convo}% connect rate`);
  h+=pulse('📱','Texts Sent',currT.texts||0,0,'This week');
  h+=pulse('📅','Appts Set',currT.appts_set||0,(tw[1]?.totals||{}).appts_set||0,'');
  const talkM=Math.round((currT.talk_secs||0)/60);
  h+=pulse('⏱️','Talk Time',talkM>60?Math.round(talkM/60)+'h '+talkM%60+'m':talkM+'m',0,'Total across team');
  h+='</div>';

  // ---- Coaching Priority (Joe's action plan) ----
  h+=`<div class="section-header"><span class="icon">🎯</span> Your Focus This Week <span class="val-muted" style="font-size:12px;font-weight:400;margin-left:8px">${cs.meeting_kpi}/${cs.total_agents} meeting KPIs (${cs.pct_meeting}%)</span></div>`;

  // Accountability group
  if(cs.need_accountability.length>0){
    h+=`<div class="action-box red"><div class="title">🚨 Accountability Check-Ins Needed</div><p style="font-size:13px;margin-bottom:8px">These agents need a 1-on-1 this week. Focus on call blocking, daily schedule, and removing excuses.</p><ul>`;
    at.filter(a=>a.coaching_type==='accountability').forEach(a=>{
      h+=`<li style="margin-bottom:6px"><strong>${a.name}</strong> <span class="tag tag-fail" style="margin-left:6px">Grade ${a.grade}</span> — ${a.insights[0]||''}</li>`;
    });
    h+='</ul></div>';
  }

  // Skill coaching group
  if(cs.need_skill.length>0){
    h+=`<div class="action-box" style="border-left-color:var(--amber)"><div class="title">📋 Skill Coaching Opportunities</div><p style="font-size:13px;margin-bottom:8px">These agents are putting in effort but need help converting. Role-play, call review, or script work.</p><ul>`;
    at.filter(a=>a.coaching_type==='skill').forEach(a=>{
      h+=`<li style="margin-bottom:6px"><strong>${a.name}</strong> <span class="tag tag-warn" style="margin-left:6px">Grade ${a.grade}</span> — ${a.insights[0]||''}</li>`;
    });
    h+='</ul></div>';
  }

  // Praise group
  if(cs.praise_list.length>0){
    h+=`<div class="action-box green"><div class="title">🌟 Recognize These Agents</div><p style="font-size:13px;margin-bottom:8px">Meeting or exceeding KPIs. Public praise reinforces the behavior you want. Challenge them to mentor struggling agents.</p><ul>`;
    at.filter(a=>a.coaching_type==='praise').forEach(a=>{
      h+=`<li style="margin-bottom:6px"><strong>${a.name}</strong> <span class="tag tag-pass" style="margin-left:6px">Grade ${a.grade}</span> — ${a.insights[0]||''}</li>`;
    });
    h+='</ul></div>';
  }

  // ---- Agent Scorecard Table (the main view) ----
  h+=`<div class="section-header"><span class="icon">📊</span> Agent Scorecard <span class="val-muted" style="font-size:12px;font-weight:400;margin-left:8px">${tw[0]?.label||''} &bull; sorted by concern</span></div>`;
  h+='<div class="table-wrap"><table><thead><tr><th>Grade</th><th>Agent</th><th>Calls</th><th style="width:80px">vs KPI</th><th>Convos</th><th style="width:80px">vs KPI</th><th>Texts</th><th>Appts</th><th>Connect %</th><th>Avg Talk</th><th>OOC</th><th>KPI</th></tr></thead><tbody>';
  at.forEach(a=>{
    const c=a.current;
    const callPct=Math.round(c.calls/Math.max(kpi.min_calls,1)*100);
    const convPct=Math.round(c.convos/Math.max(kpi.min_convos,1)*100);
    const callBarW=Math.min(callPct,100);
    const convBarW=Math.min(convPct,100);
    const callBarColor=callPct>=100?'var(--green)':callPct>=60?'var(--amber)':'var(--rose)';
    const convBarColor=convPct>=100?'var(--green)':convPct>=60?'var(--amber)':'var(--rose)';
    const kpiTag=a.kpi_pass?'<span class="tag tag-pass">PASS</span>':'<span class="tag tag-fail">FAIL</span>';
    const talkStr=a.avg_talk_min>0?a.avg_talk_min+'m':'—';

    h+=`<tr>
      <td style="text-align:center"><span style="font-size:18px;font-weight:800;color:${gradeColor(a.grade)}">${a.grade}</span></td>
      <td class="agent-name">${a.name} ${a.active_weeks<=1?'<span class="tag tag-fail" style="font-size:9px;margin-left:4px">INACTIVE</span>':''}</td>
      <td class="${a.calls_pass?'':'val-fail'}">${c.calls} ${trendArrow(a.calls_trend,a.calls_change)}</td>
      <td><div class="bar-track" style="height:6px"><div class="bar-fill" style="width:${callBarW}%;background:${callBarColor}"></div></div><span style="font-size:9px;color:var(--text-muted)">${callPct}%</span></td>
      <td class="${a.convos_pass?'':'val-fail'}">${c.convos} ${trendArrow(a.convos_trend,a.convos_change)}</td>
      <td><div class="bar-track" style="height:6px"><div class="bar-fill" style="width:${convBarW}%;background:${convBarColor}"></div></div><span style="font-size:9px;color:var(--text-muted)">${convPct}%</span></td>
      <td>${c.texts||0}</td>
      <td>${c.appts_set}${c.appts_met>0?' <span class="val-pass">('+c.appts_met+' met)</span>':''}</td>
      <td><span class="${a.call_to_convo>=10?'val-pass':a.call_to_convo>=5?'':'val-warn'}">${a.call_to_convo}%</span></td>
      <td class="${a.avg_talk_min>=3?'val-pass':a.avg_talk_min>0?'val-warn':'val-muted'}">${talkStr}</td>
      <td class="${a.ooc_pass?'':'val-fail'}">${c.ooc||0}</td>
      <td>${kpiTag}</td>
    </tr>`;
  });
  h+='</tbody></table></div>';

  // ---- Agent Trend Cards (4-week visual) ----
  h+=`<div class="section-header"><span class="icon">📈</span> 4-Week Trends <span class="val-muted" style="font-size:12px;font-weight:400;margin-left:8px">${d.week_labels.slice().reverse().map(l=>'<span style="margin:0 4px">'+l+'</span>').join('→')}</span></div>`;
  h+='<div class="trend-grid">';
  at.forEach(a=>{
    const cls=a.kpi_pass?'improving':a.concern>=40?'declining':'stable';
    const maxW=Math.max(...a.weeks.map(w=>w.calls),1);
    h+=`<div class="trend-card ${cls}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="name" style="margin:0">${a.name}</div>
        <span style="font-size:22px;font-weight:800;color:${gradeColor(a.grade)}">${a.grade}</span>
      </div>`;
    h+='<div class="stats">';
    h+=`<div class="stat-mini"><div class="num">${a.current.calls}</div><div class="lbl">Calls ${trendArrow(a.calls_trend,a.calls_change)}</div></div>`;
    h+=`<div class="stat-mini"><div class="num">${a.current.convos}</div><div class="lbl">Convos ${trendArrow(a.convos_trend,a.convos_change)}</div></div>`;
    h+=`<div class="stat-mini"><div class="num">${a.current.texts||0}</div><div class="lbl">Texts</div></div>`;
    h+=`<div class="stat-mini"><div class="num">${a.current.appts_set}</div><div class="lbl">Appts</div></div>`;
    h+='</div>';

    // Mini bar chart with week labels
    h+='<div style="display:flex;gap:3px;align-items:flex-end;height:36px;margin-top:8px">';
    a.weeks.slice().reverse().forEach((w,i)=>{
      const ht=Math.max(4,Math.round(w.calls/maxW*36));
      const isLast=i===a.weeks.length-1;
      const color=cls==='declining'?'var(--rose)':cls==='improving'?'var(--green)':'var(--surface3)';
      h+=`<div style="flex:1;height:${ht}px;background:${color};border-radius:3px 3px 0 0;opacity:${isLast?1:0.3+i*0.2}" title="${d.week_labels[a.weeks.length-1-i]}: ${w.calls} calls"></div>`;
    });
    h+='</div>';

    // Coaching note
    if(a.insights.length>0){
      h+=`<div style="margin-top:10px;padding:8px 10px;background:var(--surface2);border-radius:6px;font-size:11px;color:var(--text-muted);border-left:3px solid ${a.coaching_type==='accountability'?'var(--rose)':a.coaching_type==='praise'?'var(--green)':'var(--amber)'}">
        <strong style="color:var(--text)">${a.coaching_type==='accountability'?'⚠️ Action:':a.coaching_type==='praise'?'✅ Praise:':'📋 Coach:'}</strong> ${a.insights[0]}</div>`;
    }
    h+='</div>';
  });
  h+='</div>';

  // ---- Hidden Insights (things a great sales manager should know) ----
  h+=`<div class="section-header"><span class="icon">💡</span> Hidden Insights</div>`;
  h+='<div class="two-col">';

  // Effort vs Results quadrant
  const highEffort=at.filter(a=>a.current.calls>=kpi.min_calls);
  const lowEffort=at.filter(a=>a.current.calls<kpi.min_calls);
  const highResult=at.filter(a=>a.current.convos>=kpi.min_convos);
  const lowResult=at.filter(a=>a.current.convos<kpi.min_convos);

  const stars=at.filter(a=>a.current.calls>=kpi.min_calls&&a.current.convos>=kpi.min_convos);
  const grinders=at.filter(a=>a.current.calls>=kpi.min_calls&&a.current.convos<kpi.min_convos);
  const efficient=at.filter(a=>a.current.calls<kpi.min_calls&&a.current.convos>=kpi.min_convos);
  const disengaged=at.filter(a=>a.current.calls<kpi.min_calls&&a.current.convos<kpi.min_convos);

  h+=`<div class="action-box brand"><div class="title">Effort vs Results Matrix</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
      <div style="background:rgba(52,211,153,0.1);padding:10px;border-radius:8px"><strong style="color:var(--green)">⭐ Stars</strong><br><span style="font-size:12px">High calls + High convos</span><br>${stars.length>0?stars.map(a=>'<span class="tag tag-pass" style="margin:2px">'+a.name+'</span>').join(''):'<span class="val-muted">None this week</span>'}</div>
      <div style="background:rgba(251,191,36,0.1);padding:10px;border-radius:8px"><strong style="color:var(--amber)">💪 Grinders</strong><br><span style="font-size:12px">High calls but few convos</span><br>${grinders.length>0?grinders.map(a=>'<span class="tag tag-warn" style="margin:2px">'+a.name+'</span>').join(''):'<span class="val-muted">None</span>'}</div>
      <div style="background:rgba(96,165,250,0.1);padding:10px;border-radius:8px"><strong style="color:var(--blue)">🎯 Efficient</strong><br><span style="font-size:12px">Low calls but converting</span><br>${efficient.length>0?efficient.map(a=>'<span class="tag tag-brand" style="margin:2px">'+a.name+'</span>').join(''):'<span class="val-muted">None</span>'}</div>
      <div style="background:rgba(251,113,133,0.1);padding:10px;border-radius:8px"><strong style="color:var(--rose)">🚨 Disengaged</strong><br><span style="font-size:12px">Low calls + Low convos</span><br>${disengaged.length>0?disengaged.map(a=>'<span class="tag tag-fail" style="margin:2px">'+a.name+'</span>').join(''):'<span class="val-muted">None</span>'}</div>
    </div></div>`;

  // Consistency tracker
  h+=`<div class="action-box brand"><div class="title">Consistency Check (4 Weeks Active)</div>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px">Agents who show up every week build pipeline. Inconsistency kills momentum.</p>`;
  at.forEach(a=>{
    const dots=a.weeks.slice().reverse().map((w,i)=>{
      const active=w.calls>0;
      return `<span style="display:inline-block;width:16px;height:16px;border-radius:50%;background:${active?'var(--green)':'var(--rose)'};margin-right:4px;opacity:${i===a.weeks.length-1?1:0.6}" title="${d.week_labels[a.weeks.length-1-i]}: ${w.calls} calls"></span>`;
    }).join('');
    h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span style="width:140px;font-size:12px;font-weight:600">${a.name}</span>${dots}
      <span style="font-size:11px;color:var(--text-muted)">${a.active_weeks}/4 weeks</span></div>`;
  });
  h+='</div>';
  h+='</div>';

  return h;
}

// ======== TAB 3: ISA ========
function buildIsa(d) {
  const c=d.current, p=d.previous;
  let h='';

  function isaCard(icon,label,curr,prev,suffix=''){
    const pct=prev>0?Math.round((curr-prev)/prev*100):(curr>0?100:0);
    const dir=pct>10?'up':pct<-10?'down':'flat';
    return `<div class="stat-card"><div class="icon">${icon}</div><div class="label">${label}</div><div class="value" style="color:var(--brand)">${curr}${suffix}</div><div class="trend">${trendArrow(dir,pct)}</div><div class="sub">Last week: ${prev}${suffix}</div></div>`;
  }

  h+='<div class="stat-grid" style="grid-template-columns:repeat(4,1fr)">';
  h+=isaCard('&#128222;','Calls Made',c.calls,p.calls);
  h+=isaCard('&#128172;','Conversations',c.convos,p.convos);
  h+=isaCard('&#128197;','Appts Set',c.appts_set,p.appts_set);
  h+=isaCard('&#127919;','Show Rate',c.show_rate,p.show_rate,'%');
  h+='</div>';

  // Funnel
  const maxF=Math.max(c.calls,1);
  h+=`<div class="section-header"><span class="icon">&#127919;</span> Conversion Funnel</div>`;
  h+='<div class="funnel">';
  [{l:'Calls',v:c.calls,c:'var(--brand)',p:''},{l:'Convos',v:c.convos,c:'var(--blue)',p:c.calls>0?Math.round(c.convos/c.calls*100)+'%':''},{l:'Appts Set',v:c.appts_set,c:'var(--green)',p:c.convos>0?Math.round(c.appts_set/c.convos*100)+'%':''},{l:'Appts Met',v:c.appts_met,c:'var(--purple)',p:c.appts_set>0?Math.round(c.appts_met/c.appts_set*100)+'%':''}].forEach(s=>{
    const w=Math.max(Math.round(s.v/maxF*100),s.v>0?3:0);
    h+=`<div class="funnel-step"><div class="funnel-label">${s.l}</div><div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${w}%;background:${s.c}">${s.v}</div></div><div class="funnel-pct">${s.p}</div></div>`;
  });
  h+='</div>';

  // Sparklines
  h+=`<div class="section-header"><span class="icon">&#128200;</span> Monthly Trends</div>`;
  h+='<div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">';
  ['calls','convos','appts'].forEach(key=>{
    const data=d.sparkline[key];const mx=Math.max(...data.map(d=>d.value),1);
    h+=`<div class="stat-card"><div class="label">${key} / week</div><div style="display:flex;gap:4px;align-items:flex-end;height:40px;margin-top:8px">`;
    data.forEach((pt,i)=>{const ht=Math.max(4,Math.round(pt.value/mx*40));h+=`<div style="flex:1;height:${ht}px;background:var(--brand);border-radius:3px 3px 0 0;opacity:${0.4+i*0.2}" title="${pt.label}: ${pt.value}"></div>`;});
    h+='</div><div class="sub" style="display:flex;justify-content:space-between;margin-top:4px">';
    data.forEach(pt=>h+=`<span style="font-size:9px">${pt.label}</span>`);
    h+='</div></div>';
  });
  h+='</div>';

  // Efficiency + Pipeline side by side
  h+='<div class="two-col">';
  // Efficiency
  h+='<div>';
  h+=`<div class="section-header"><span class="icon">&#9889;</span> Efficiency</div>`;
  h+=`<div class="action-box brand"><ul style="font-size:13px">`;
  h+=`<li><strong>Calls per appointment:</strong> ${c.calls_per_appt||'—'}</li>`;
  h+=`<li><strong>Speed to lead:</strong> ${d.speed_to_lead.avg!==null?d.speed_to_lead.avg.toFixed(1)+' min':'No data'} (${d.speed_to_lead.count} leads)</li>`;
  h+=`<li><strong>No-shows:</strong> ${c.no_show} &bull; <strong>Pending:</strong> ${c.pending}</li>`;
  h+=`</ul></div></div>`;
  // Pipeline
  h+='<div>';
  h+=`<div class="section-header"><span class="icon">&#128202;</span> Pipeline (${d.pipeline.total} leads)</div>`;
  h+='<div class="action-box brand">';
  const stages=Object.entries(d.pipeline.stages).sort((a,b)=>b[1]-a[1]);
  stages.forEach(([s,ct])=>{const w=Math.round(ct/d.pipeline.total*100);h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="width:120px;font-size:12px">${s}</span><div class="bar-track" style="flex:1;height:6px"><div class="bar-fill fill-brand" style="width:${w}%"></div></div><span style="font-size:11px;color:var(--text-muted)">${ct}</span></div>`;});
  h+='</div></div>';
  h+='</div>';

  // Top sources
  if(d.pipeline.top_sources.length>0){
    h+=`<div class="section-header"><span class="icon">&#128176;</span> Lead Sources</div>`;
    h+='<div class="table-wrap"><table><thead><tr><th>Source</th><th>Leads</th><th></th></tr></thead><tbody>';
    const mxS=d.pipeline.top_sources[0].count;
    d.pipeline.top_sources.forEach(s=>{h+=`<tr><td class="agent-name">${s.source}</td><td>${s.count}</td><td><div class="bar-track" style="height:8px"><div class="bar-fill fill-brand" style="width:${Math.round(s.count/mxS*100)}%"></div></div></td></tr>`;});
    h+='</tbody></table></div>';
  }

  // Dropped balls
  if(d.dropped_balls.length>0){
    h+=`<div class="section-header"><span class="icon">&#128680;</span> Dropped Balls (${d.dropped_balls.length})</div>`;
    h+=`<p style="font-size:12px;color:var(--text-muted);margin-bottom:10px">Appointments Fhalen set where the agent hasn't logged an outcome.</p>`;
    h+='<div class="table-wrap"><table><thead><tr><th>Lead</th><th>Agent</th><th>Appt Date</th><th>Stage</th><th>Tagged</th></tr></thead><tbody>';
    d.dropped_balls.forEach(db=>{h+=`<tr><td class="agent-name">${db.lead_name}</td><td>${db.agent_name}</td><td>${db.appt_date}</td><td>${db.stage}</td><td>${db.has_tag?'<span class="tag tag-pass">Yes</span>':'<span class="tag tag-warn">No</span>'}</td></tr>`;});
    h+='</tbody></table></div>';
    const untagged=d.dropped_balls.filter(db=>!db.has_tag);
    if(untagged.length>0){h+=`<button class="btn btn-rose btn-sm" onclick="tagPending([${untagged.map(db=>db.person_id).join(',')}])">Tag ${untagged.length} leads as Fhalen_Pending</button>`;}
  }

  return h;
}

async function tagPending(ids) {
  if(!confirm(`Tag ${ids.length} leads with Fhalen_Pending?`)) return;
  try{const r=await fetch('/api/isa/tag-pending',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({person_ids:ids})});const d=await r.json();if(d.success)alert(`Tagged ${d.tagged} leads!`);else alert('Error: '+d.error);}catch(e){alert('Error: '+e.message);}
}

// Shared actions
async function saveSettings(){try{await fetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({min_calls:+document.getElementById('minCalls').value,min_convos:+document.getElementById('minConvos').value,max_ooc:+document.getElementById('maxOoc').value})});}catch(e){}}
async function updateGroup(){if(!agentData)return;const btn=document.getElementById('btnUpdateGroup');btn.disabled=true;btn.textContent='...';const ids=agentData.agents.filter(a=>a.evaluation.overall_pass).map(a=>a.user_id);try{const r=await fetch('/api/update-group',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_ids:ids})});const d=await r.json();btn.textContent=d.success?`Done (${d.count})`:'Failed';setTimeout(()=>{btn.textContent='Update Group';btn.disabled=false},2000);}catch(e){btn.textContent='Update Group';btn.disabled=false;}}
async function sendEmail(){const btn=document.getElementById('btnSendEmail');btn.disabled=true;btn.textContent='...';try{const r=await fetch('/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({min_calls:+document.getElementById('minCalls').value,min_convos:+document.getElementById('minConvos').value,max_ooc:+document.getElementById('maxOoc').value})});const d=await r.json();btn.textContent=d.success?'Sent!':'Failed';setTimeout(()=>{btn.textContent='Email Report';btn.disabled=false},2000);}catch(e){btn.textContent='Email Report';btn.disabled=false;}}

loadAgents();
</script>
</body>

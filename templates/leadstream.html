<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadStream — Legacy Home Team</title>
<style>
:root {
  --bg: #05070e;
  --surface: #111827;
  --surface2: #1e2536;
  --surface3: #2a3349;
  --border: #2e3a52;
  --text: #edf0f7;
  --text-muted: #7e89a3;
  --brand: #3B8AFF;
  --brand-dim: rgba(59,138,255,0.12);
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.1);
  --blue: #60a5fa;
  --purple: #a78bfa;
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.1);
  --rose: #fb7185;
  --rose-dim: rgba(251,113,133,0.1);
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(59,138,255,0.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(96,165,250,0.04) 0%,transparent 50%);min-height:100vh}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 36px;background:rgba(17,24,39,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;height:60px}
.topbar h1{font-size:18px;font-weight:800}
.topbar h1 span{color:var(--brand)}
.topbar h1 .gray{color:var(--text-muted);font-weight:400}
.tabs{display:flex;gap:0;height:100%}
.tab{padding:0 24px;height:100%;display:flex;align-items:center;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;text-decoration:none}
.tab:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}

.container{max-width:1320px;margin:0 auto;padding:24px 36px 80px}

.btn{padding:9px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:12px;font-weight:700;transition:all 0.2s;letter-spacing:0.3px}
.btn-primary{background:linear-gradient(135deg,#3B8AFF,#2563eb);color:#fff;box-shadow:0 2px 12px rgba(59,138,255,0.3)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-info{background:linear-gradient(135deg,#60a5fa,#818cf8);color:#fff}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important}
.btn-sm{padding:6px 14px;font-size:11px}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.stat-card .label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:4px}
.stat-card .value{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat-card .sub{font-size:11px;color:var(--text-muted);margin-top:4px}

.section-header{display:flex;align-items:center;gap:8px;margin:28px 0 14px;font-size:15px;font-weight:700}
.section-header .icon{font-size:18px}

.bar-track{height:6px;border-radius:4px;background:var(--surface2);overflow:hidden;margin:8px 0 12px}
.bar-fill{height:100%;border-radius:4px;transition:width 0.8s ease;min-width:2px}
.fill-green{background:linear-gradient(90deg,var(--green),#22c55e)}
.fill-amber{background:linear-gradient(90deg,var(--amber),#f59e0b)}
.fill-brand{background:linear-gradient(90deg,#3B8AFF,#2563eb)}

/* Status banner */
.status-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:var(--shadow)}
.status-left{display:flex;align-items:center;gap:16px}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot-amber{background:var(--amber);box-shadow:0 0 8px var(--amber)}
.dot-rose{background:var(--rose);box-shadow:0 0 8px var(--rose)}
.status-text{font-weight:700;font-size:14px}
.status-meta{font-size:12px;color:var(--text-muted)}
.status-right{display:flex;gap:10px;align-items:center}

/* Agent grid */
.agents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px;margin-bottom:8px}
.agent-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
.agent-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.agent-name-text{font-weight:700;font-size:15px}
.agent-count{font-size:12px;color:var(--text-muted);font-weight:600}
.agent-rate{font-size:11px;font-weight:700;margin-bottom:2px}

/* Lead rows */
.leads-list{display:flex;flex-direction:column;gap:2px;max-height:320px;overflow-y:auto;padding-right:4px}
.leads-list::-webkit-scrollbar{width:4px}
.leads-list::-webkit-scrollbar-track{background:transparent}
.leads-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
.lead-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:8px;transition:background 0.15s}
.lead-row:hover{background:var(--surface2)}
.lead-row.actioned{background:rgba(52,211,153,0.05);border-left:2px solid var(--green)}
.lead-row:not(.actioned){border-left:2px solid transparent}
.lead-info{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.lead-name-link{font-size:13px;font-weight:500;color:var(--text);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.lead-name-link:hover{color:var(--brand)}
.lead-activity{display:flex;gap:4px;align-items:center;flex-shrink:0}

/* Tags */
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0.3px;white-space:nowrap}
.tag-rose{background:var(--rose-dim);color:var(--rose)}
.tag-amber{background:var(--amber-dim);color:var(--amber)}
.tag-brand{background:var(--brand-dim);color:var(--brand)}
.tag-green{background:var(--green-dim);color:var(--green)}
.tag-purple{background:rgba(167,139,250,0.12);color:var(--purple)}
.tag-muted{background:rgba(126,137,163,0.1);color:var(--text-muted)}

/* Activity badges */
.act-badge{font-size:13px;line-height:1}
.act-none{font-size:11px;color:var(--surface3)}

/* Pond collapsible */
.pond-toggle{display:flex;align-items:center;gap:16px;margin-bottom:0;cursor:pointer;user-select:none;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.pond-toggle:hover{background:var(--surface2)}
.pond-toggle-arrow{font-size:11px;color:var(--text-muted);margin-left:auto;transition:transform 0.2s}
.pond-body{overflow:hidden;max-height:0;transition:max-height 0.35s ease,margin-top 0.2s ease;margin-top:0}
.pond-body.open{max-height:2000px;margin-top:10px}

/* Pond table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:10px 14px;text-align:left;font-weight:700;color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--border);background:var(--surface2)}
tbody td{padding:9px 14px;border-bottom:1px solid rgba(46,58,82,0.5)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,0.025)}
tbody tr.actioned-row td:first-child{border-left:2px solid var(--green)}
.pond-name-link{color:var(--text);text-decoration:none;font-weight:500}
.pond-name-link:hover{color:var(--brand)}

/* History */
.history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;box-shadow:var(--shadow)}
.history-time{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.history-count{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.history-sub{font-size:11px;color:var(--text-muted)}
.history-mode{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;margin-top:4px;display:inline-block}
.mode-full{background:var(--brand-dim);color:var(--brand)}
.mode-pond{background:rgba(167,139,250,0.12);color:var(--purple)}

/* Weekly tracker */
.weekly-scroll{overflow-x:auto;margin-bottom:20px}
.weekly-table{border-collapse:collapse;font-size:12px;min-width:100%}
.weekly-table th,.weekly-table td{padding:8px 12px;text-align:center;white-space:pre-line}
.weekly-table thead tr{background:var(--surface2)}
.weekly-table thead th{color:var(--text-muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;border-bottom:1px solid var(--border)}
.weekly-table th.col-agent,.weekly-table td.col-agent{text-align:left;font-weight:600;color:var(--text);position:sticky;left:0;background:var(--surface);z-index:2;min-width:150px;padding-left:16px}
.weekly-table thead th.col-agent{background:var(--surface2)}
.weekly-table tbody tr{border-bottom:1px solid rgba(46,58,82,0.4)}
.weekly-table tbody tr:hover td{background:rgba(255,255,255,0.02)}
.weekly-table tbody tr:hover td.col-agent{background:var(--surface2)}
.wk-cell{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:60px}
.wk-rate{font-size:13px;font-weight:700}
.wk-sub{font-size:10px;color:var(--text-muted)}
.wk-bar{width:40px;height:3px;border-radius:2px;background:var(--surface3)}
.wk-bar-fill{height:100%;border-radius:2px}
.wk-green{color:var(--green)}.wk-amber{color:var(--amber)}.wk-brand{color:var(--brand)}.wk-muted{color:var(--text-muted)}
.wk-cell-green .wk-bar-fill{background:var(--green)}.wk-cell-amber .wk-bar-fill{background:var(--amber)}.wk-cell-brand .wk-bar-fill{background:var(--brand)}.wk-cell-muted .wk-bar-fill{background:var(--surface3)}
.wk-total-row td{background:rgba(59,138,255,0.04)!important;font-weight:700;border-top:1px solid var(--border)}
.wk-empty{color:var(--text-muted);font-size:13px;padding:20px}
.mode-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-bottom:2px}
.mode-dot-full{background:var(--brand)}.mode-dot-pond{background:var(--purple)}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 20px;font-size:13px;font-weight:600;z-index:1000;box-shadow:var(--shadow);transition:opacity 0.3s;opacity:0;pointer-events:none}
#toast.show{opacity:1}

/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:768px){.agents-grid{grid-template-columns:1fr}.container{padding:16px 16px 60px}}
</style>
</head>
<body>

<div class="topbar">
  <h1>Legacy Home Team <span class="gray">/ </span><span>LeadStream</span></h1>
  <div class="tabs">
    <a class="tab" href="/">KPI Audit</a>
    <a class="tab active" href="/leadstream">LeadStream</a>
  </div>
</div>

<div class="container">

  <!-- Status Banner -->
  <div class="status-banner" id="status-banner">
    <div class="status-left">
      <div class="status-dot dot-amber" id="status-dot"></div>
      <div>
        <div class="status-text" id="status-text">Loading&hellip;</div>
        <div class="status-meta" id="status-meta"></div>
      </div>
    </div>
    <div class="status-right">
      <div style="text-align:right;margin-right:8px">
        <div style="font-size:11px;color:var(--text-muted)">Next full run</div>
        <div style="font-size:13px;font-weight:700" id="next-run">&mdash;</div>
      </div>
      <button class="btn btn-primary btn-sm" id="btn-full" onclick="runNow(false)">&#9889; Run Now</button>
      <button class="btn btn-info btn-sm" id="btn-pond" onclick="runNow(true)">&#129416; Pond Only</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stat-grid" id="stats-row">
    <div class="stat-card"><div class="label">Total Tagged</div><div class="value skeleton" style="height:36px;width:80px">&nbsp;</div></div>
    <div class="stat-card"><div class="label">Actioned</div><div class="value skeleton" style="height:36px;width:60px">&nbsp;</div></div>
    <div class="stat-card"><div class="label">Action Rate</div><div class="value skeleton" style="height:36px;width:70px">&nbsp;</div></div>
    <div class="stat-card"><div class="label">Agent Leads</div><div class="value skeleton" style="height:36px;width:60px">&nbsp;</div></div>
    <div class="stat-card"><div class="label">Pond Leads</div><div class="value skeleton" style="height:36px;width:60px">&nbsp;</div></div>
  </div>

  <!-- Agent Cards -->
  <div class="section-header"><span class="icon">&#128100;</span> Agent Priority Lists</div>
  <div class="agents-grid" id="agents-grid">
    <div class="agent-card"><div class="skeleton" style="height:200px"></div></div>
    <div class="agent-card"><div class="skeleton" style="height:200px"></div></div>
  </div>

  <!-- Pond -->
  <div class="section-header"><span class="icon">&#129416;</span> Shark Tank &mdash; Pond Leads</div>
  <div id="pond-wrap">
    <div class="table-wrap"><div class="skeleton" style="height:240px"></div></div>
  </div>

  <!-- History -->
  <div class="section-header"><span class="icon">&#128203;</span> Run History</div>
  <div class="history-grid" id="history-wrap"></div>

  <!-- Weekly Engagement Tracker -->
  <div class="section-header"><span class="icon">&#128197;</span> Weekly Engagement Tracker</div>
  <div id="weekly-wrap"><div class="skeleton" style="height:180px;border-radius:16px"></div></div>

</div>

<div id="toast"></div>

<script>
const TIER_INFO = {
  'AI_NEEDS_FOLLOW_UP':       {label:'rAIya',      cls:'tag-rose'},
  'AI_VOICE_NEEDS_FOLLOW_UP': {label:'AI Voice',   cls:'tag-rose'},
  'HANDRAISER':               {label:'Handraiser', cls:'tag-amber'},
  'YPRIORITY':                {label:'Y-Priority', cls:'tag-brand'},
  'SITE_ACTIVE':              {label:'Site Active',cls:'tag-brand'},
  'STALE_HOT':                {label:'Stale Hot',  cls:'tag-amber'},
  'AGING_NEW':                {label:'New Lead',   cls:'tag-green'},
  'RE_ENGAGE':                {label:'Re-engage',  cls:'tag-purple'},
  'COLD_LEAD':                {label:'Cold',       cls:'tag-muted'},
};

function tierBadge(tier) {
  const info = TIER_INFO[tier] || {label: tier || '&mdash;', cls: 'tag-muted'};
  return `<span class="tag ${info.cls}">${info.label}</span>`;
}

function actBadges(lead) {
  const b = [];
  if (lead.called)  b.push('<span class="act-badge" title="Outbound call made">&#128222;</span>');
  if (lead.texted)  b.push('<span class="act-badge" title="Text sent">&#128172;</span>');
  if (lead.updated && !lead.called && !lead.texted) b.push('<span class="act-badge" title="Record updated in FUB">&#128260;</span>');
  return b.length ? b.join('') : '<span class="act-none">&mdash;</span>';
}

function fubLink(id) {
  return `https://app.followupboss.com/2/people/view/${id}`;
}

function timeAgo(iso) {
  if (!iso) return '&mdash;';
  const d = new Date(iso), now = new Date();
  const m = Math.floor((now - d) / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}

function fmtTime(iso) {
  if (!iso) return '&mdash;';
  return new Date(iso).toLocaleString('en-US', {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
}

function nextRunStr() {
  const now = new Date();
  const h = now.getUTCHours(), m = now.getUTCMinutes();
  const runHours = [6,10,14,18];
  for (const rh of runHours) {
    const diffMin = (rh - h) * 60 - m + 7;
    if (diffMin > 0) {
      return diffMin < 60 ? `in ${diffMin}m` : `in ${Math.floor(diffMin/60)}h ${diffMin%60}m`;
    }
  }
  const diffMin = (30 - h) * 60 - m + 7;
  return `in ~${Math.floor(diffMin/60)}h`;
}

function renderStatus(data) {
  const lastRun = data.last_run;
  const minAgo = lastRun ? Math.floor((Date.now() - new Date(lastRun)) / 60000) : null;
  const stale = minAgo === null || minAgo > 270; // >4.5h = missed a cycle
  const warnings = data.api_warnings || [];

  let dotClass = stale ? 'dot-amber' : 'dot-green';
  let statusText = stale ? 'Scoring may be stale' : 'System Healthy';
  if (warnings.length > 0) { dotClass = 'dot-amber'; statusText = 'Partial data — some API calls failed'; }

  document.getElementById('status-dot').className = `status-dot ${dotClass}`;
  document.getElementById('status-text').textContent = statusText;
  document.getElementById('status-meta').textContent = lastRun
    ? `Last run ${timeAgo(lastRun)} \u00b7 ${fmtTime(lastRun)} \u00b7 ${data.last_run_mode === 'pond_only' ? 'Pond only' : 'Full scoring'}`
    : 'No runs recorded yet';
  document.getElementById('next-run').textContent = nextRunStr();

  // Show API warning banner if activity data is incomplete
  let warnEl = document.getElementById('api-warning-banner');
  if (warnings.length > 0) {
    if (!warnEl) {
      warnEl = document.createElement('div');
      warnEl.id = 'api-warning-banner';
      warnEl.style.cssText = 'background:#422006;border:1px solid #92400e;border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:13px;color:#fbbf24;';
      document.querySelector('.container').insertBefore(warnEl, document.getElementById('stats-row').parentElement);
    }
    warnEl.innerHTML = '⚠️ <strong>Activity data may be incomplete:</strong> ' + warnings.map(w => `<span>${w}</span>`).join(' &middot; ');
  } else if (warnEl) {
    warnEl.remove();
  }
}

function renderStats(data) {
  const t = data.totals;
  const rateColor = t.action_rate >= 50 ? 'var(--green)' : t.action_rate >= 25 ? 'var(--amber)' : 'var(--rose)';
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="label">Total Tagged</div>
      <div class="value">${t.total}</div>
      <div class="sub">agents + pond</div>
    </div>
    <div class="stat-card">
      <div class="label">Actioned</div>
      <div class="value" style="color:var(--green)">${t.actioned}</div>
      <div class="sub">called or texted</div>
    </div>
    <div class="stat-card">
      <div class="label">Action Rate</div>
      <div class="value" style="color:${rateColor}">${t.action_rate}%</div>
      <div class="sub">since last run</div>
    </div>
    <div class="stat-card">
      <div class="label">Agent Leads</div>
      <div class="value">${t.agent_leads}</div>
      <div class="sub">across all agents</div>
    </div>
    <div class="stat-card">
      <div class="label">Pond Leads</div>
      <div class="value" style="color:var(--purple)">${t.pond_leads}</div>
      <div class="sub">shared pool</div>
    </div>
  `;
}

function renderAgents(agents) {
  const grid = document.getElementById('agents-grid');
  const entries = Object.entries(agents);
  if (!entries.length) {
    grid.innerHTML = '<div class="agent-card" style="color:var(--text-muted);font-size:13px">No agent leads tagged yet.</div>';
    return;
  }

  grid.innerHTML = entries.map(([name, data]) => {
    const {leads, tagged, actioned} = data;
    const rate = tagged > 0 ? Math.round(actioned / tagged * 100) : 0;
    const fillCls = rate >= 80 ? 'fill-green' : rate >= 40 ? 'fill-amber' : 'fill-brand';
    const rateColor = rate >= 80 ? 'var(--green)' : rate >= 40 ? 'var(--amber)' : 'var(--text-muted)';

    const sorted = [...leads].sort((a,b) => {
      if (a.actioned !== b.actioned) return b.actioned - a.actioned;
      return (b.score||0) - (a.score||0);
    });

    const rows = sorted.map(lead => `
      <div class="lead-row ${lead.actioned ? 'actioned' : ''}">
        <div class="lead-info">
          <a class="lead-name-link" href="${fubLink(lead.id)}" target="_blank" title="${lead.name}">${lead.name || 'No Name'}</a>
          ${tierBadge(lead.tier)}
        </div>
        <div class="lead-activity">${actBadges(lead)}</div>
      </div>
    `).join('');

    return `
      <div class="agent-card">
        <div class="agent-header">
          <span class="agent-name-text">${name}</span>
          <span class="agent-count">${tagged} leads</span>
        </div>
        <div class="agent-rate" style="color:${rateColor}">${actioned} of ${tagged} actioned &nbsp;&middot;&nbsp; ${rate}%</div>
        <div class="bar-track"><div class="bar-fill ${fillCls}" style="width:${rate}%"></div></div>
        <div class="leads-list">${rows}</div>
      </div>
    `;
  }).join('');
}

function renderPond(pond) {
  const wrap = document.getElementById('pond-wrap');
  const {leads, tagged, actioned} = pond;
  if (!tagged) {
    wrap.innerHTML = '<div class="stat-card" style="color:var(--text-muted);font-size:13px">No pond leads tagged.</div>';
    return;
  }

  const sorted = [...leads].sort((a,b) => {
    if (a.actioned !== b.actioned) return b.actioned - a.actioned;
    return (b.score||0) - (a.score||0);
  });

  const rate = tagged > 0 ? Math.round(actioned / tagged * 100) : 0;

  const rows = sorted.map(lead => `
    <tr class="${lead.actioned ? 'actioned-row' : ''}">
      <td><a class="pond-name-link" href="${fubLink(lead.id)}" target="_blank">${lead.name || 'No Name'}</a></td>
      <td>${tierBadge(lead.tier)}</td>
      <td style="font-weight:700;color:var(--text-muted)">${lead.score || 0}</td>
      <td>${actBadges(lead)}</td>
    </tr>
  `).join('');

  const barCls = rate>=50?'fill-green':rate>=25?'fill-amber':'fill-brand';
  wrap.innerHTML = `
    <div class="pond-toggle" onclick="togglePond(this)">
      <span style="font-size:13px;color:var(--text-muted)">${actioned} of ${tagged} pond leads actioned</span>
      <div class="bar-track" style="flex:1;margin:0"><div class="bar-fill ${barCls}" style="width:${rate}%"></div></div>
      <span style="font-size:13px;font-weight:700;color:var(--text)">${rate}%</span>
      <span class="pond-toggle-arrow">&#9660; Show ${tagged} leads</span>
    </div>
    <div class="pond-body" id="pond-body">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Lead</th>
            <th>Tier</th>
            <th>Score</th>
            <th>Activity</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function togglePond(btn) {
  const body = document.getElementById('pond-body');
  const arrow = btn.querySelector('.pond-toggle-arrow');
  const isOpen = body.classList.toggle('open');
  const tagged = body.querySelector('tbody').children.length;
  arrow.innerHTML = isOpen
    ? `&#9650; Hide leads`
    : `&#9660; Show ${tagged} leads`;
}

function renderHistory(history) {
  const wrap = document.getElementById('history-wrap');
  if (!history || !history.length) {
    wrap.innerHTML = '<div style="color:var(--text-muted);font-size:13px">No run history yet.</div>';
    return;
  }
  const sorted = [...history].reverse();
  wrap.innerHTML = sorted.map(run => `
    <div class="history-item">
      <div class="history-time">${fmtTime(run.time)}</div>
      <div class="history-count">${run.total || 0}</div>
      <div class="history-sub">${run.agent_leads || 0} agents &middot; ${run.pond_leads || 0} pond</div>
      <span class="history-mode ${run.mode === 'pond_only' ? 'mode-pond' : 'mode-full'}">${run.mode === 'pond_only' ? 'Pond only' : 'Full'}</span>
    </div>
  `).join('');
}

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isError ? 'var(--rose)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

async function loadDashboard() {
  try {
    const res = await fetch('/api/leadstream/dashboard');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderStatus(data);
    renderStats(data);
    renderAgents(data.agents);
    renderPond(data.pond);
    renderHistory(data.run_history);
  } catch(e) {
    document.getElementById('status-text').textContent = 'Failed to load dashboard';
    document.getElementById('status-dot').className = 'status-dot dot-rose';
    console.error(e);
  }
}

async function runNow(pondOnly) {
  const btn = document.getElementById(pondOnly ? 'btn-pond' : 'btn-full');
  btn.disabled = true;
  btn.textContent = pondOnly ? '⏳ Running…' : '⏳ Scoring…';
  showToast(pondOnly ? 'Pond refresh started…' : 'Full scoring started — takes ~3 min…');

  try {
    const res = await fetch('/api/leadstream/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({dry_run: false, pond_only: pondOnly})
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const jobId = data.job_id;
    // Poll until complete — up to 10 min (200 attempts × 3s)
    let attempts = 0;
    const maxAttempts = 200;
    const poll = setInterval(async () => {
      attempts++;
      try {
        const sr = await fetch(`/api/leadstream/run/status/${jobId}`);
        const status = await sr.json();
        if (status.status === 'complete') {
          clearInterval(poll);
          showToast(`✅ Done — ${status.summary || 'leads tagged'}`);
          await loadDashboard();
          btn.disabled = false;
          btn.textContent = pondOnly ? '🦈 Pond Only' : '⚡ Run Now';
        } else if (status.status === 'error') {
          clearInterval(poll);
          showToast(`❌ Run failed: ${status.error}`, true);
          btn.disabled = false;
          btn.textContent = pondOnly ? '🦈 Pond Only' : '⚡ Run Now';
        } else if (attempts >= maxAttempts) {
          clearInterval(poll);
          showToast('⚠️ Scoring still running in background — page will auto-refresh', true);
          btn.disabled = false;
          btn.textContent = pondOnly ? '🦈 Pond Only' : '⚡ Run Now';
          // Keep auto-refreshing dashboard until data appears
          let refreshCount = 0;
          const autoRefresh = setInterval(async () => {
            refreshCount++;
            await loadDashboard();
            if (refreshCount >= 10) clearInterval(autoRefresh);
          }, 30000);
        } else {
          // Still running — show elapsed time and estimated progress
          const elapsed = Math.round(attempts * 3);
          const mins = Math.floor(elapsed / 60);
          const secs = elapsed % 60;
          btn.textContent = mins > 0 ? `⏳ ${mins}m ${secs}s…` : `⏳ ${secs}s…`;
        }
      } catch(e) {
        // Ignore poll errors, keep trying
      }
    }, 3000);

  } catch(e) {
    showToast(`❌ ${e.message}`, true);
    btn.disabled = false;
    btn.textContent = pondOnly ? '🦈 Pond Only' : '⚡ Run Now';
  }
}

function wkCellClass(rate) {
  if (rate >= 50) return 'wk-cell-green';
  if (rate >= 25) return 'wk-cell-amber';
  if (rate > 0)   return 'wk-cell-brand';
  return 'wk-cell-muted';
}
function wkRateClass(rate) {
  if (rate >= 50) return 'wk-green';
  if (rate >= 25) return 'wk-amber';
  if (rate > 0)   return 'wk-brand';
  return 'wk-muted';
}

async function loadWeekly() {
  try {
    const res = await fetch('/api/leadstream/weekly');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderWeekly(data);
  } catch(e) {
    document.getElementById('weekly-wrap').innerHTML =
      '<div class="wk-empty">Could not load weekly data.</div>';
  }
}

function renderWeekly(data) {
  const wrap = document.getElementById('weekly-wrap');
  const { runs, agents } = data;
  if (!runs || runs.length === 0) {
    wrap.innerHTML = '<div class="wk-empty">No weekly data yet — will populate after the next scoring run.</div>';
    return;
  }

  // Build 7-day totals per agent
  const totals = {};
  for (const agent of agents) {
    totals[agent] = {tagged: 0, actioned: 0};
    for (const run of runs) {
      const a = run.agents[agent] || {tagged:0, actioned:0};
      totals[agent].tagged   += a.tagged;
      totals[agent].actioned += a.actioned;
    }
    totals[agent].rate = totals[agent].tagged > 0
      ? Math.round(totals[agent].actioned / totals[agent].tagged * 100) : 0;
  }

  // Header row
  const runHeaders = runs.map(r => {
    const modeDot = r.mode === 'pond_only'
      ? '<span class="mode-dot mode-dot-pond"></span>'
      : '<span class="mode-dot mode-dot-full"></span>';
    return `<th>${modeDot}<br>${r.label}</th>`;
  }).join('');

  // Agent rows
  const agentRows = agents.map(agent => {
    const cells = runs.map(run => {
      const a = run.agents[agent] || {tagged:0, actioned:0, rate:0};
      if (a.tagged === 0) return '<td><span class="wk-muted" style="font-size:11px">—</span></td>';
      const cls = wkCellClass(a.rate);
      const rateCls = wkRateClass(a.rate);
      return `<td>
        <div class="wk-cell ${cls}">
          <span class="wk-rate ${rateCls}">${a.rate}%</span>
          <span class="wk-sub">${a.actioned}/${a.tagged}</span>
          <div class="wk-bar"><div class="wk-bar-fill" style="width:${Math.min(a.rate,100)}%"></div></div>
        </div></td>`;
    }).join('');
    const t = totals[agent];
    const totCls = wkRateClass(t.rate);
    const totCell = t.tagged > 0
      ? `<td><div class="wk-cell ${wkCellClass(t.rate)}">
           <span class="wk-rate ${totCls}">${t.rate}%</span>
           <span class="wk-sub">${t.actioned}/${t.tagged}</span>
           <div class="wk-bar"><div class="wk-bar-fill" style="width:${Math.min(t.rate,100)}%"></div></div>
         </div></td>`
      : '<td><span class="wk-muted">—</span></td>';
    return `<tr><td class="col-agent">${agent}</td>${cells}${totCell}</tr>`;
  }).join('');

  // Grand total row
  const grandCells = runs.map(run => {
    const t = run.total;
    if (!t || t.tagged === 0) return '<td>—</td>';
    return `<td><div class="wk-cell ${wkCellClass(t.rate)}">
      <span class="wk-rate ${wkRateClass(t.rate)}">${t.rate}%</span>
      <span class="wk-sub">${t.actioned}/${t.tagged}</span>
    </div></td>`;
  }).join('');
  const grandTotal = agents.reduce((acc, ag) => {
    acc.tagged += totals[ag].tagged; acc.actioned += totals[ag].actioned; return acc;
  }, {tagged:0, actioned:0});
  grandTotal.rate = grandTotal.tagged > 0 ? Math.round(grandTotal.actioned / grandTotal.tagged * 100) : 0;
  const grandTotCell = `<td><div class="wk-cell ${wkCellClass(grandTotal.rate)}">
    <span class="wk-rate ${wkRateClass(grandTotal.rate)}">${grandTotal.rate}%</span>
    <span class="wk-sub">${grandTotal.actioned}/${grandTotal.tagged}</span>
  </div></td>`;

  wrap.innerHTML = `
    <div class="weekly-scroll">
      <table class="weekly-table">
        <thead><tr>
          <th class="col-agent">Agent</th>
          ${runHeaders}
          <th style="color:var(--text);font-weight:800">7-Day Total</th>
        </tr></thead>
        <tbody>
          ${agentRows}
          <tr class="wk-total-row">
            <td class="col-agent">All Agents</td>
            ${grandCells}
            ${grandTotCell}
          </tr>
        </tbody>
      </table>
    </div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:8px">
      &#9679; Full run &nbsp;&#9679; <span style="color:var(--purple)">&#9679;</span> Pond only &nbsp;&nbsp;
      Updates automatically as agents engage leads &mdash; no page reload needed.
    </div>`;
}

let _cacheTs = 0;
loadDashboard();
loadWeekly();
setInterval(loadDashboard, 3 * 60 * 1000);
setInterval(loadWeekly, 5 * 60 * 1000);
</script>
